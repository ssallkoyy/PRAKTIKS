apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: NodePort  # Требование: тип NodePort
  selector:
    app: my-app   # Должен совпадать с labels в deployment
  ports:
    - protocol: TCP
      port: 80        # Порт самого сервиса внутри кластера
      targetPort: 80  # Порт контейнера, куда перенаправляется трафик
      nodePort: 32000 # Внешний порт на ноде (диапазон 30000-32767)